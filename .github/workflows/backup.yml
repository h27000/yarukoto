name: 毎日バックアップ

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 日本時間 0:00（UTC 15:00）
  workflow_dispatch:       # 手動実行もできる

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Firebase からデータを取得
        run: |
          mkdir -p backups
          DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          curl -s "https://tasklist-ea51c-default-rtdb.firebaseio.com/.json" \
            -o "backups/${DATE}.json"
          echo "バックアップ完了: backups/${DATE}.json"
          cat "backups/${DATE}.json" | head -c 200

      - name: 古いバックアップを削除（30日以上前）
        run: |
          find backups/ -name "*.json" -mtime +30 -delete || true

      - name: バックアップをコミット＆プッシュ
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "🍊 自動バックアップ $(TZ='Asia/Tokyo' date +%Y-%m-%d)"
          git push
